<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - SparkTech</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Product Page Specific Layout */
        .product-detail-container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; margin-bottom: 60px; }
        .media-gallery { display: flex; flex-direction: column; gap: 15px; }
        .media-gallery img, .media-gallery video { width: 100%; border-radius: 16px; box-shadow: var(--shadow-sm); border: 1px solid #e2e8f0; object-fit: cover; }
        .product-info-box h1 { font-size: 2.2rem; margin-bottom: 10px; color: var(--text-dark); }
        .product-info-box .price { font-size: 2rem; color: var(--primary); font-weight: bold; margin-bottom: 20px; }
        .action-buttons { display: flex; gap: 15px; margin-top: 30px; align-items: center; }
        
        .btn-share { padding: 12px 20px; border-radius: 8px; border: 2px solid var(--primary); background: white; color: var(--primary); font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-share:hover { background: var(--bg-color); transform: translateY(-3px); }
        
        .specs-list { margin-top: 25px; background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow-sm); }
        .specs-list h3 { margin-bottom: 15px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .specs-list ul { list-style: none; }
        .specs-list ul li { margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 1.05rem; }
        .specs-list ul li span { font-weight: bold; color: var(--text-muted); }
        
        @media (max-width: 768px) { .product-detail-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body data-page="product">

    <div id="toast-container"></div>

    <nav class="navbar">
        <a href="index.html" class="logo">Spark<span>Tech</span></a>
        <div class="search-container">
            <i class='bx bx-search'></i>
            <input type="text" id="searchInput" placeholder="Search products...">
            <div class="search-results" id="searchResults"></div>
        </div>
        <div class="icons-container">
            <a href="wishlist.html" title="Wishlist"><i class='bx bx-heart'></i></a>
            <a href="cart.html" title="Cart"><i class='bx bx-cart'></i></a>
            <div class="menu-toggle" id="mobileMenuBtn"><i class='bx bx-menu'></i></div>
        </div>
    </nav>

    <div class="container product-detail-container" id="detailContainer">
        <h2>Loading Product details...</h2>
    </div>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 SparkTech Electronics. All Rights Reserved.</p>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
    <script type="module" src="productRender.js"></script>
</body>
</html>
