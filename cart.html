<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - SparkTech</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="cart">

    <div id="toast-container"></div>

    <nav class="navbar">
        <a href="index.html" class="logo">Spark<span>Tech</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="laptops.html">Laptops</a>
            <a href="mobiles.html">Mobiles</a>
        </div>
        <div class="icons-container">
            <a href="wishlist.html"><i class='bx bx-heart'></i></a>
            <div class="menu-toggle" id="mobileMenuBtn"><i class='bx bx-menu'></i></div>
        </div>
    </nav>

    <div class="container" style="min-height: 60vh;">
        <h2 style="margin-bottom: 30px; color: var(--text-dark); border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;">
            <i class='bx bx-cart' style="color: var(--primary);"></i> My Shopping Cart
        </h2>
        
        <div class="grid" id="cartGrid">
            </div>
        
        <div id="cartTotalBox" style="display: none; margin-top: 40px; background: white; padding: 30px; border-radius: 16px; box-shadow: var(--shadow-sm); text-align: right;">
            <h3 style="font-size: 1.5rem; color: var(--text-muted);">Total Amount:</h3>
            <div id="cartTotalAmount" style="font-size: 2.5rem; color: var(--primary); font-weight: bold; margin-bottom: 20px;">₹0</div>
            <button style="padding: 15px 40px; background: #10b981; color: white; border: none; border-radius: 30px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);">
                Proceed to Checkout <i class='bx bx-right-arrow-alt'></i>
            </button>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 SparkTech Electronics. All Rights Reserved.</p>
        </div>
    </footer>

    <script type="module" src="app.js"></script>
    <script type="module" src="cartRender.js"></script>
</body>
</html>
